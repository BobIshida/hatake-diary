<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Bob's Farm Diary</title>

<style>
:root { --card:#fffdf8; --ink:#253026; --muted:#6f766f; --green:#47734d; --green2:#e4efe2; --line:#e2ddcf; }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,"Segoe UI",Arial,sans-serif; background:linear-gradient(180deg,#eef6eb 0,#f7f4ec 260px); color:var(--ink); line-height:1.75; }
html[lang="en"] body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; }
header { max-width:1100px; margin:0 auto; padding:56px 22px 28px; }
.hero { background:rgba(255,253,248,.82); border:1px solid var(--line); border-radius:28px; padding:34px; box-shadow:0 18px 50px rgba(42,54,38,.08); position:relative; }
.lang-toggle { text-decoration:none; display:inline-block; position:absolute; right:24px; top:24px; border:1px solid #cddbc9; background:#fff; color:#315c35; border-radius:999px; padding:9px 16px; cursor:pointer; font-weight:700; }
h1 { margin:0; font-size:clamp(34px,6vw,64px); letter-spacing:.04em; padding-right:120px; }
.lead { max-width:760px; color:var(--muted); font-size:18px; margin:12px 0 0; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:26px; }
.stat { background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; }
.stat strong { display:block; font-size:26px; color:var(--green); }
main { max-width:1100px; margin:0 auto; padding:0 22px 70px; }
.toolbar { position:sticky; top:0; z-index:5; backdrop-filter:blur(10px); background:rgba(247,244,236,.86); padding:12px 0; }
.filters,.view-tabs { display:flex; gap:10px; flex-wrap:wrap; }
.view-tabs { margin-top:14px; }
.filter,.view-tab { border:1px solid #cddbc9; background:#fff; color:#315c35; border-radius:999px; padding:9px 14px; cursor:pointer; font-size:14px; font-weight:700; }
.filter.active,.view-tab.active { background:var(--green); color:#fff; border-color:var(--green); }
.timeline { display:grid; gap:22px; margin-top:20px; }
.entry { background:var(--card); border:1px solid var(--line); border-radius:24px; padding:24px; box-shadow:0 12px 30px rgba(42,54,38,.06); }
.entry-meta { display:flex; justify-content:space-between; gap:16px; align-items:flex-start; flex-wrap:wrap; margin-bottom:10px; }
time { color:var(--green); font-weight:700; }
.tags { display:flex; gap:8px; flex-wrap:wrap; }
.tags span { background:var(--green2); color:#37603b; border-radius:999px; padding:4px 10px; font-size:13px; cursor:pointer; }
.entry p { margin:10px 0 0; font-size:17px; white-space:pre-wrap; }
.memo { margin-top:16px; padding:14px 16px; border-left:4px solid #9abf8f; border-radius:14px; background:#f6fbf4; color:#314733; }
.memo strong { color:#24502b; }
.gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; margin-top:18px; }
.gallery a { display:block; overflow:hidden; border-radius:16px; background:#eee; aspect-ratio:4/3; border:1px solid var(--line); }
.gallery img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s ease; }
.gallery a:hover img { transform:scale(1.04); }
footer { text-align:center; color:var(--muted); padding:24px; border-top:1px solid var(--line); }
.story-text { display:none; border-left:4px solid var(--green); padding-left:16px; color:#334336; }
body.story-mode .diary-text, body.story-mode .memo { display:none; }
body.story-mode .story-text { display:block; }
.error { max-width:900px; margin:30px auto; padding:18px; background:#fff4f4; border:1px solid #e7bcbc; border-radius:16px; }
@media (max-width:720px) { .hero { padding:24px; } .lang-toggle { position:static; margin-bottom:16px; } h1 { padding-right:0; } .stats { grid-template-columns:1fr; } .entry { padding:18px; border-radius:18px; } }
</style>

</head>
<body>
<header>
<section class="hero">
<a class="lang-toggle" href="index_en.html">English</a>
<h1 id="title">Bob's Farm Diary</h1>
<p class="lead" id="lead"></p>
<div class="stats">
<div class="stat" id="statEntries"></div>
<div class="stat" id="statPhotos"></div>
<div class="stat" id="statPeriod"></div>
</div>
</section>
</header>
<main>
<div class="toolbar">
<div class="filters" id="filters"></div>
<div class="view-tabs"><button class="view-tab active" data-view="diary" id="diaryTab" type="button"></button><button class="view-tab" data-view="story" id="storyTab" type="button"></button></div>
</div>
<div id="appError"></div>
<section class="timeline" id="timeline"></section>
</main>
<footer id="footer"></footer>

<script>
const LANG = document.documentElement.lang === 'en' ? 'en' : 'ja';
let allEntries = [];
let activeFilter = 'all';

const labels = {
  ja: {
    lead: 'Excelに記録された畑仕事のメモと写真を、日付順に読める小さなウェブ日記にしました。',
    all: 'すべて', entries: '記録数', photos: '写真', period: '期間', diary: '日記', story: 'ストーリー',
    memo: '一言メモ', footer: 'Generated from 畑日記.xlsx', error: 'diary.json を読み込めませんでした。GitHub Pages上で開いているか、content/diary.json が存在するか確認してください。'
  },
  en: {
    lead: 'A small web diary made from notes and photos of farm work, arranged in chronological order.',
    all: 'All', entries: 'Entries', photos: 'Photos', period: 'Period', diary: 'Diary', story: 'Story',
    memo: 'Reflection', footer: 'Generated from Hatake Diary.xlsx', error: 'Could not load diary.json. Please check that content/diary.json exists and this page is opened via GitHub Pages.'
  }
};

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  if (LANG === 'ja') {
    const w = ['日','月','火','水','木','金','土'][d.getDay()];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
  }
  return d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', weekday:'short' }).replace(',', '');
}
function tagList(entry) { return LANG === 'ja' ? entry.tags_ja : entry.tags_en; }
function textBlock(entry, key) { return (entry[LANG] && entry[LANG][key]) || ''; }
function imageHtml(entry) {
  if (!entry.images || !entry.images.length) return '';
  const alt = LANG === 'ja' ? '畑日記写真' : 'Farm diary photo';
  return `<div class="gallery">${entry.images.map(img => `<a href="assets/${escapeHtml(img)}" target="_blank"><img alt="${alt}" loading="lazy" src="assets/${escapeHtml(img)}"></a>`).join('')}</div>`;
}
function renderStats(data) {
  const photoCount = allEntries.reduce((sum, e) => sum + (e.images ? e.images.length : 0), 0);
  const dates = allEntries.map(e => e.date).sort();
  document.getElementById('lead').textContent = labels[LANG].lead;
  document.getElementById('statEntries').innerHTML = `<strong>${allEntries.length}</strong>${labels[LANG].entries}`;
  document.getElementById('statPhotos').innerHTML = `<strong>${photoCount}</strong>${labels[LANG].photos}`;
  document.getElementById('statPeriod').innerHTML = `<strong>${formatDate(dates[0])}〜<br>${formatDate(dates[dates.length-1])}</strong>${labels[LANG].period}`;
  document.getElementById('footer').textContent = labels[LANG].footer;
  document.getElementById('diaryTab').textContent = labels[LANG].diary;
  document.getElementById('storyTab').textContent = labels[LANG].story;
}
function renderFilters() {
  const counts = new Map();
  allEntries.forEach(e => tagList(e).forEach(t => counts.set(t, (counts.get(t) || 0) + 1)));
  const order = Array.from(counts.entries()).sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  const filters = document.getElementById('filters');
  filters.innerHTML = `<button class="filter active" data-tag="all">${labels[LANG].all}</button>` +
    order.map(([tag, count]) => `<button class="filter" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)} <small>${count}</small></button>`).join('');
  filters.querySelectorAll('.filter').forEach(btn => btn.addEventListener('click', () => applyFilter(btn.dataset.tag)));
}
function renderEntries() {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = allEntries.map(e => {
    const tags = tagList(e);
    const diary = textBlock(e, 'diary');
    const memo = textBlock(e, 'memo');
    const story = textBlock(e, 'story');
    return `<article class="entry" data-tags="${escapeHtml(tags.join('|'))}">
      <div class="entry-meta">
        <time>${formatDate(e.date)}</time>
        <div class="tags">${tags.map(t => `<span>${escapeHtml(t)}</span>`).join('')}</div>
      </div>
      <p class="diary-text">${escapeHtml(diary)}</p>
      ${memo ? `<div class="memo"><strong>${labels[LANG].memo}</strong><p>${escapeHtml(memo)}</p></div>` : ''}
      ${story ? `<p class="story-text">${escapeHtml(story)}</p>` : ''}
      ${imageHtml(e)}
    </article>`;
  }).join('');
  document.querySelectorAll('.tags span').forEach(span => {
    span.addEventListener('click', () => {
      const tag = span.textContent.trim();
      applyFilter(tag);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
  applyFilter(activeFilter);
}
function applyFilter(tag) {
  activeFilter = tag;
  document.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
  document.querySelectorAll('.entry').forEach(entry => {
    const tags = (entry.dataset.tags || '').split('|');
    entry.style.display = (tag === 'all' || tags.includes(tag)) ? '' : 'none';
  });
}
document.querySelectorAll('.view-tab').forEach(tab => tab.addEventListener('click', () => {
  const view = tab.dataset.view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  document.body.classList.toggle('story-mode', view === 'story');
}));
fetch('content/diary.json')
  .then(r => {
    if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
    return r.json();
  })
  .then(data => {
    document.getElementById('title').textContent = data.site_title || "Bob's Farm Diary";
    allEntries = (data.entries || []).sort((a,b) => b.date.localeCompare(a.date));
    renderStats(data);
    renderFilters();
    renderEntries();
  })
  .catch(err => {
    document.getElementById('appError').innerHTML = `<div class="error">${labels[LANG].error}<br><small>${escapeHtml(err.message)}</small></div>`;
  });
</script>

</body>
</html>
