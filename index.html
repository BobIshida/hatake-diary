<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bob's Farm Diary</title>
<style>
body{font-family:Arial;background:#f6f3ea;max-width:1100px;margin:auto;padding:20px}
.hero{background:white;padding:24px;border-radius:20px}
.entry{background:white;padding:20px;border-radius:18px;margin:20px 0}
.filters,.tabs,.tags{display:flex;gap:8px;flex-wrap:wrap}
.filter,.tab,.btn{padding:8px 14px;border-radius:999px;border:none;background:#47734d;color:white;text-decoration:none;cursor:pointer}
.tag{background:#e4efe2;padding:4px 10px;border-radius:999px}
.story{display:none;white-space:pre-wrap}
body.story-mode .story{display:block}
body.story-mode .diary, body.story-mode .memo{display:none}
.memo{background:#eef6eb;padding:12px;border-radius:12px;margin-top:10px}
</style></head><body>
<div class="hero">
<div style="display:flex;justify-content:space-between;align-items:center">
<h1>Bob's Farm Diary</h1>
<a class="btn" href="index_en.html">English</a>
</div>
<div class="filters" id="filters"></div>
<div class="tabs">
<button class="tab" onclick="document.body.classList.remove('story-mode')">Diary</button>
<button class="tab" onclick="document.body.classList.add('story-mode')">Story</button>
</div>
</div>
<div id="entries"></div>
<script>
fetch('content/diary.json').then(r=>r.json()).then(data=>{
const root=document.getElementById('entries');
const allTags=new Set();
data.entries.forEach(e=>{(e.tags_ja||[]).forEach(t=>allTags.add(t));});
document.getElementById('filters').innerHTML='<button class="filter">All</button>'+Array.from(allTags).map(t=>`<button class="filter">${t}</button>`).join('');
data.entries.forEach(e=>{
 const div=document.createElement('div');
 div.className='entry';
 div.innerHTML=`<h3>${e.date}</h3>
 <div class="tags">${(e.tags_ja||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
 <div class="diary">${e.ja.diary||''}</div>
 ${e.ja.memo?`<div class="memo">${e.ja.memo}</div>`:''}
 <div class="story">${e.ja.story||''}</div>`;
 root.appendChild(div);
});
});
</script></body></html>
