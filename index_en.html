<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bob's Farm Diary</title>
<style>
body{font-family:Arial,sans-serif;max-width:1000px;margin:auto;padding:20px;background:#f6f3ea}
.entry{background:white;padding:20px;border-radius:16px;margin:20px 0}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:15px}
.gallery img{width:100%;border-radius:12px}
.top{display:flex;justify-content:space-between;align-items:center}
a.button{padding:10px 16px;background:#47734d;color:white;text-decoration:none;border-radius:999px}
.memo{background:#eef6eb;padding:12px;border-radius:12px;margin-top:12px}
</style></head><body>
<div class="top"><h1>Bob's Farm Diary</h1><a class="button" href="index.html">日本語</a></div>
<div id="app"></div>
<script>
fetch('content/diary.json').then(r=>r.json()).then(data=>{
const app=document.getElementById('app');
data.entries.forEach(e=>{
const div=document.createElement('div');
div.className='entry';
div.innerHTML=`<h3>${e.date}</h3><p>${e.ja.diary||''}</p>${e.ja.memo?`<div class="memo">${e.ja.memo}</div>`:''}<div class="gallery">${(e.images||[]).map(i=>`<a href="assets/${i}" target="_blank"><img src="assets/${i}"></a>`).join('')}</div>`;
app.appendChild(div);
});
});
</script></body></html>
